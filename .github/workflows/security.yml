name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"
      - name: Run bandit
        run: bandit -r pyntrace/ -c pyproject.toml --severity-level medium -f json -o bandit-report.json
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e . --dry-run --ignore-installed -q 2>&1 | grep -v "Would install" || true) --skip-editable || pip-audit -r <(pip freeze) --ignore-vuln PYSEC-2024-48

  ruff-security:
    name: Ruff security rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check security rules (S series)
        run: ruff check pyntrace/ --select S --output-format github
